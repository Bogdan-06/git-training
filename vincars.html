<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verificare VIN</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <header>
      <h1>🚗Verificare VIN</h1>
      <h2>Introdu seria VIN pentru a vedea modelul si modificarile masinii</h2>
    </header>

    <section class="container">
      <input
        type="text"
        id="vin"
        placeholder="Introdu VIN-ul (17 caractere)"
        maxlength="17"
        autocomplete="off"
        spellcheck="false"
      >

      <section class="container">
      <input
        type="text"
        id="vin"
        placeholder="Buton test"
        autocomplete="off"
        spellcheck="false"
      >

      <button type="button" onclick="verificaVIN()">Verifica VIN</button>
      <button type="button" onclick="genereazaVIN()">Genereaza VIN</button>
    </section>

    <section class="card" id="rezultat" aria-live="polite"></section>
  </main>

  <audio id="engineSound" src="engine.mp3" preload="auto"></audio>

  <script src="script.js"></script>
</body>
</html>
